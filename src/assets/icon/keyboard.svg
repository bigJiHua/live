<svg width="24" height="18" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect x="0" y="0" width="120" height="90" rx="10" fill="#f5f5f5"/>

  <!-- 键盘外框 -->
  <rect x="15" y="20" width="90" height="30" rx="6" fill="#d0d0d0" stroke="#b5b5b5" stroke-width="1.5"/>

  <!-- 按键 -->
  <g fill="#bdbdbd">
    <!-- 第一排 -->
    <rect x="20" y="25" width="8" height="6" rx="1"/>
    <rect x="30" y="25" width="8" height="6" rx="1"/>
    <rect x="40" y="25" width="8" height="6" rx="1"/>
    <rect x="50" y="25" width="8" height="6" rx="1"/>
    <rect x="60" y="25" width="8" height="6" rx="1"/>
    <rect x="70" y="25" width="8" height="6" rx="1"/>
    <rect x="80" y="25" width="8" height="6" rx="1"/>

    <!-- 第二排 -->
    <rect x="22" y="33" width="8" height="6" rx="1"/>
    <rect x="32" y="33" width="8" height="6" rx="1"/>
    <rect x="42" y="33" width="8" height="6" rx="1"/>
    <rect x="52" y="33" width="8" height="6" rx="1"/>
    <rect x="62" y="33" width="8" height="6" rx="1"/>
    <rect x="72" y="33" width="8" height="6" rx="1"/>

    <!-- 第三排 -->
    <rect x="25" y="41" width="10" height="6" rx="1"/>
    <rect x="37" y="41" width="10" height="6" rx="1"/>
    <rect x="49" y="41" width="20" height="6" rx="1"/>
    <rect x="71" y="41" width="10" height="6" rx="1"/>
  </g>

  <!-- 向下 V 箭头（贴近键盘底部） -->
  <path d="M45 60 L60 74 L75 60"
        fill="none"
        stroke="#888"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
